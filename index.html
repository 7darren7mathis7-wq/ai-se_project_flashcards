<!doctype html>
<html lang="en">
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Playwrite+NZ+Guides&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./assets/css/index.css" />
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Darren Mathis" />
    <meta
      name="description"
      content="Online Flashcard App for learning coding"
    />
    <meta
      name="keywords"
      content="flashcard, flashcard-app, coding flashcard"
    />
    <script type="module" src="./assets/js/index.js"></script>
    <title>Flash-Card Program</title>
  </head>

  <body class="page">
    <header class="header">
      <h1 class="header__title">
        <a href="#home" class="header__link">Flash Cards</a>
      </h1>
      <nav class="nav">
        <ul class="nav__links">
          <li><a href="#home" class="nav__link">My Decks</a></li>
          <li><a href="#about" class="nav__link">About</a></li>
        </ul>
      </nav>
    </header>

    <main class="page__main-content">
      <section id="home" class="gallery">
        <h2 class="gallery__title">My Decks</h2>
        <div class="gallery__container">
          <ul class="gallery__list"></ul>
          <template id="deck-template">
            <li class="card">
              <a class="card__link" href="#"></a>
              <h3 class="card__title"></h3>
              <div class="card__row">
                <p class="card__count"></p>
                <button
                  class="card__delete-btn"
                  type="button"
                  aria-label="Delete Deck"
                >
                  <img src="./assets/images/delete.svg" alt="delete button" />
                </button>
              </div>
            </li>
          </template>
          <button
            class="gallery__new-card-btn"
            type="button"
            aria-label="Add New Deck"
          >
            + New Deck
          </button>
        </div>
      </section>

      <section id="carousel" class="carousel" style="display: none">
        <button class="carousel__back-btn" type="button">Back to Decks</button>
        <h2 class="carousel__title">Deck Name &middot; 1/10</h2>
        <div class="carousel__card">
          <div class="carousel__controls">
            <button
              aria-label="Go to previous card"
              class="carousel__btn_type_left carousel__btn carousel__btn_disabled"
              type="button"
              disabled
            >
              <img src="./assets/images/left.svg" alt="Previous card" />
            </button>
            <div class="carousel__card-text">Question</div>
            <button
              type="button"
              aria-label="Go to Next"
              class="carousel__btn_type_right carousel__btn"
            >
              <img src="./assets/images/right.svg" alt="Next card" />
            </button>
          </div>
          <button
            type="button"
            aria-label="Flip Card"
            class="carousel__btn_type_flip carousel__btn"
          >
            <img src="./assets/images/flip.svg" alt="Flip card" />
          </button>
        </div>
      </section>

      <section id="about" class="about" style="display: none">
        <h2>About</h2>
        <p>
          Use this app to study flashcards by topic. Click a deck to open the
          carousel view.
        </p>
      </section>
    </main>

    <section id="not-found" class="not-found" style="display: none">
      <h2 class="not-found__status-code">404</h2>
      <p class="not-found__text">Sorry, nothing found!</p>
    </section>

    <footer class="footer">
      <p class="footer__text">&copy;2026 Darren Mathis</p>
    </footer>
  </body>
</html>
